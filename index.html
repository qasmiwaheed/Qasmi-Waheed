  <meta name="keywords" content="Arabic Calligraphy, Qatar Calligrapher, Waheed Qasmi, Khattat, Islamic Art Tutor, Doha Calligraphy">

  <style>
    /* ================= DYNAMIC MODERN DESIGN SYSTEM ================= */
    :root {
      --gold: #d4af37; 
      --gold-dark: #aa8416;
      --bg-primary: #faf8f5;
      --bg-secondary: #ffffff;
      --text-main: #1a1a1a;
      --text-muted: #5a5a5a;
      --border-color: rgba(212, 175, 55, 0.15);
      --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.03);
      --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }

    [data-theme="dark"] {
      --bg-primary: #0a0a0a;
      --bg-secondary: #121212;
      --text-main: #f5f5f5;
      --text-muted: #b0b0b0;
      --border-color: rgba(212, 175, 55, 0.25);
      --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-main);
      line-height: 1.7;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background 0.5s ease, color 0.5s ease;
    }

    ::-selection { background: var(--gold); color: #fff; }

    /* ================= SMOOTH REVEAL ANIMATION ================= */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: var(--transition);
    }
    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* ================= PREMIUM HERO SECTION (VERIFIED SECURE QATAR GRAND MOSQUE) ================= */
    header {
      position: relative;
      height: 100vh;
      /* Using a premium, fully secure global cloud CDN for the famous illuminated Grand Mosque of Doha, Qatar */
      background: linear-gradient(rgba(12, 12, 18, 0.55), rgba(8, 8, 12, 0.85)), 
                  url('https://images.fineartamerica.com/images/artworkimages/mediumlarge/3/qatar-state-mosque-doha-panoramic-images.jpg');
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
      padding: 0 20px;
    }

    .hero-container {
      max-width: 900px;
      z-index: 2;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      margin: 0;
      color: var(--gold);
      letter-spacing: 6px;
      font-weight: 400;
      text-transform: uppercase;
      text-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }

    .hero-subtitle {
      font-family: 'Inter', sans-serif;
      letter-spacing: 7px;
      font-weight: 300;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      margin-top: 15px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    .hero-badge {
      display: inline-block;
      border: 1px solid var(--gold);
      padding: 6px 16px;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
      color: var(--gold);
      background: rgba(214, 175, 55, 0.15);
      border-radius: 50px;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .scroll-down {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-size: 1.5rem;
      animation: bounce 2s infinite;
      cursor: pointer;
      z-index: 2;
    }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
      40% { transform: translate(-50%, -10px); }
      60% { transform: translate(-50%, -5px); }
    }

    /* ================= NAVIGATION BAR ================= */
    nav {
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 20px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      z-index: 1000;
      transition: var(--transition);
    }

    .nav-links { 
      display: flex; 
      align-items: center; 
      justify-content: center;
      flex-wrap: wrap; 
      width: 100%;
      gap: 15px 25px;
    }

    nav a {
      color: var(--text-main);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: var(--transition);
      font-weight: 500;
      position: relative;
      white-space: nowrap; 
    }

    nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 1px;
      bottom: -5px;
      left: 0;
      background-color: var(--gold);
      transition: var(--transition);
    }

    nav a:hover::after { width: 100%; }
    nav a:hover { color: var(--gold); }

    .theme-toggle {
      background: none;
      border: none;
      color: var(--text-main);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 5px;
      transition: var(--transition);
    }
    .theme-toggle:hover { color: var(--gold); transform: scale(1.1); }

    /* ================= SECTION STYLING ================= */
    .section { padding: 140px 24px; max-width: 1200px; margin: auto; }

    .section-title-wrapper { text-align: center; margin-bottom: 70px; }
    .section h2 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 4vw, 2.8rem);
      margin: 0;
      font-weight: 400;
      letter-spacing: 2px;
    }
    .section-subtitle {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--gold);
      margin-top: 10px;
      font-weight: 600;
    }

    /* ================= ABOUT ARTIST (SECURE HIGH-SPEED CALLIGRAPHY LINK) ================= */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 60px;
      align-items: center;
    }

    .about-image-frame {
      position: relative;
      border: 1px solid var(--border-color);
      padding: 12px;
      background: var(--bg-secondary);
      box-shadow: var(--card-shadow);
      border-radius: 4px;
    }

    .about-image-frame img {
      width: 100%;
      height: auto;
      max-height: 430px;
      object-fit: cover;
      display: block;
      border-radius: 2px;
    }

    .about-content h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      margin-top: 0;
      font-weight: 400;
    }

    .institution {
      color: var(--gold);
      font-size: 0.85rem;
      letter-spacing: 3px;
      font-weight: 600;
      text-transform: uppercase;
      display: block;
      margin-bottom: 15px;
    }

    /* ================= TEACHING SECTION ================= */
    .teaching-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .course-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      padding: 40px;
      border-radius: 4px;
      box-shadow: var(--card-shadow);
      transition: var(--transition);
    }

    .course-card:hover {
      transform: translateY(-10px);
      border-color: var(--gold);
    }

    .course-icon {
      font-size: 2rem;
      color: var(--gold);
      margin-bottom: 25px;
    }

    .course-card h4 {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      margin: 0 0 15px 0;
      font-weight: 400;
    }

    /* ================= PREMIUM INSTAGRAM GALLERY (LOCKED TO MOBILE FRAME) ================= */
    .portfolio-bg { background-color: var(--bg-secondary); border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); }
    
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); 
      gap: 30px;
      width: 100%;
    }

    .insta-wrapper {
      background: var(--bg-primary);
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      box-shadow: var(--card-shadow);
      transition: var(--transition);
      width: 100%;
      max-width: 100%;
      overflow: hidden; 
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .insta-wrapper iframe {
      max-width: 100% !important;
      width: 100% !important;
      min-width: 100% !important;
      margin: 0 auto !important;
    }
    
    .insta-wrapper:hover { transform: scale(1.01); }

    .btn {

      align-items: center;
      gap: 10px;
      border: 1px solid var(--gold);
      color: var(--text-main);
      padding: 16px 36px;
      text-decoration: none;
      letter-spacing: 2px;
